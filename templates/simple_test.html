<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>QRжөӢиҜ• - з®ҖеҚ•зүҲ</title>
    <style>
        body { font-family: sans-serif; padding: 30px; max-width: 800px; margin: 0 auto; }
        .box { border: 3px dashed #007bff; padding: 50px; text-align: center; margin: 30px 0; border-radius: 10px; }
        .btn { padding: 15px 30px; font-size: 16px; margin: 10px; cursor: pointer; }
        #result { margin-top: 30px; padding: 20px; background: #e7f3ff; border-radius: 8px; }
        #preview { max-width: 100%; max-height: 400px; margin-top: 20px; }
        .log { font-size: 12px; color: #666; background: #f5f5f5; padding: 10px; margin-top: 20px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>рҹ”Қ дәҢз»ҙз ҒиҜҶеҲ«еҷЁ</h1>
    
    <div class="box">
        <h2>ж–№ејҸ1: йҖүжӢ©ж–Үд»¶</h2>
        <input type="file" id="file" accept="image/*" style="width: 300px; padding: 10px; font-size: 16px;">
        <p><button class="btn" onclick="uploadFile()">дёҠдј е№¶иҜҶеҲ«</button></p>
    </div>
    
    <div class="box" style="border-color: #28a745;">
        <h2>ж–№ејҸ2: зІҳиҙҙжҲӘеӣҫ (жҺЁиҚҗ)</h2>
        <p>1. жҢү <kbd>Win+Shift+S</kbd> жҲӘеӣҫ</p>
        <p>2. еӣһеҲ°жң¬йЎөйқўпјҢжҢү <kbd>Ctrl+V</kbd></p>
        <p>3. иҮӘеҠЁиҜҶеҲ«</p>
        <p><small>еҰӮжһңCtrl+Vж— ж•ҲпјҢзӮ№еҮ»дёӢж–№жҢүй’®жҝҖжҙ»</small></p>
        <p><button class="btn" onclick="activatePaste()">жҝҖжҙ»зІҳиҙҙеҠҹиғҪ</button></p>
    </div>
    
    <div id="loading" style="display:none; text-align:center; font-size: 20px; margin: 20px 0;">
        вҸі еӨ„зҗҶдёӯ...
    </div>
    
    <div id="preview-section" style="display:none;">
        <h3>еӣҫзүҮйў„и§Ҳ:</h3>
        <img id="preview">
    </div>
    
    <div id="result"></div>
    
    <div id="status" class="log"></div>
    
    <script>
        const logEl = document.getElementById('status');
        const resultEl = document.getElementById('result');
        const previewSec = document.getElementById('preview-section');
        const previewImg = document.getElementById('preview');
        const loading = document.getElementById('loading');
        
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            logEl.textContent += `[${time}] ${msg}\n`;
            console.log(msg);
        }
        
        function showLoading(show) {
            loading.style.display = show ? 'block' : 'none';
        }
        
        // ============ ж–Үд»¶дёҠдј  ============
        document.getElementById('file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) await processFile(file);
        });
        
        function uploadFile() {
            const fileInput = document.getElementById('file');
            if (fileInput.files[0]) {
                processFile(fileInput.files[0]);
            } else {
                alert('иҜ·е…ҲйҖүжӢ©ж–Үд»¶');
            }
        }
        
        // ============ зІҳиҙҙеҠҹиғҪ - дҪҝз”Ёдј з»ҹpasteдәӢд»¶ ============
        function activatePaste() {
            log('зІҳиҙҙеҠҹиғҪе·ІжҝҖжҙ»пјҢиҜ·жҢү Ctrl+V');
            alert('иҜ·жҢү Ctrl+V зІҳиҙҙжҲӘеӣҫпјҢз„¶еҗҺжҹҘзңӢдёӢж–№з»“жһң');
        }
        
        // зІҳиҙҙдәӢд»¶зӣ‘еҗ¬пјҲжңҖе…је®№пјү
        document.addEventListener('paste', async (e) => {
            log('жЈҖжөӢеҲ°зІҳиҙҙдәӢд»¶');
            
            try {
                // ж–№жі•1: дҪҝз”ЁclipboardDataпјҲжңҖе…је®№пјү
                const clipboard = e.clipboardData;
                if (!clipboard) {
                    log('ж— clipboardData');
                    return;
                }
                
                // жЈҖжҹҘжҳҜеҗҰжңүеӣҫзүҮ
                const types = clipboard.types;
                log('еүӘиҙҙжқҝзұ»еһӢ: ' + (types.length > 0 ? types.join(', ') : 'ж— еӣҫзүҮ'));
                
                let file = null;
                
                // е°қиҜ•ж–№жі•A: items.getAsFile()
                try {
                    if (clipboard.items && clipboard.items.length > 0) {
                        for (let item of clipboard.items) {
                            if (item.type.startsWith('image/')) {
                                file = item.getAsFile();
                                if (file && file.size > 0) {
                                    log('ж–№жі•1жҲҗеҠҹ: ' + file.size + ' bytes');
                                    break;
                                }
                            }
                        }
                    }
                } catch (err) {
                    log('itemsж–№жі•еӨұиҙҘ: ' + err.message);
                }
                
                // ж–№жі•B: getData
                if (!file) {
                    try {
                        for (let fmt of ['image/png', 'image/jpeg']) {
                            const data = clipboard.getData(fmt);
                            if (data) {
                                log('ж–№жі•2: йҖҡиҝҮgetDataиҺ·еҸ–' + data.length + ' bytes');
                                const blob = new Blob([data], { type: fmt });
                                file = new File([blob], 'paste.png', { type: fmt });
                                break;
                            }
                        }
                    } catch (err) {
                        log('getDataж–№жі•еӨұиҙҘ: ' + err.message);
                    }
                }
                
                if (!file) {
                    log('еүӘиҙҙжқҝдёӯжңӘжүҫеҲ°еӣҫзүҮ');
                    return;
                }
                
                e.preventDefault();
                log('иҺ·еҸ–еҲ°ж–Үд»¶: ' + file.name + ' (' + file.size + ' bytes)');
                await processFile(file);
                
            } catch (err) {
                log('зІҳиҙҙеӨ„зҗҶејӮеёё: ' + err.message);
                console.error(err);
            }
        }, false);  // дҪҝз”ЁfalseпјҲ bubbling phaseпјү
        
        // ============ еӨ„зҗҶж–Үд»¶ ============
        async function processFile(file) {
            log('еӨ„зҗҶж–Үд»¶: ' + file.name);
            showLoading(true);
            
            // йў„и§Ҳ
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewSec.style.display = 'block';
            };
            reader.readAsDataURL(file);
            
            // дёҠдј 
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                log('еҸ‘йҖҒиҜ·жұӮеҲ° /upload...');
                const res = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                log('жңҚеҠЎеҷЁе“Қеә”: ' + JSON.stringify(data));
                
                if (data.success) {
                    if (data.data.length === 0) {
                        resultEl.innerHTML = '<p style="color:#f00">вҡ пёҸ жңӘеҸ‘зҺ°дәҢз»ҙз Ғ</p>';
                    } else {
                        resultEl.innerHTML = data.data.map((q, i) => `
                            <div style="border:2px solid #28a745; padding:15px; margin:10px 0; border-radius:5px;">
                                <strong>рҹ”ў дәҢз»ҙз Ғ #${i+1}</strong><br>
                                зұ»еһӢ: ${q.type}<br>
                                <strong>еҶ…е®№:</strong><br>
                                <code style="display:block; background:#fff; padding:10px; margin:5px 0; font-size:14px;">${q.data}</code>
                                ${q.rect ? '<small>дҪҚзҪ®: ('+q.rect.left+','+q.rect.top+') е°әеҜё: '+q.rect.width+'Г—'+q.rect.height+'</small>' : ''}
                            </div>
                        `).join('');
                    }
                } else {
                    resultEl.innerHTML = '<p style="color:#f00">вқҢ ' + data.message + '</p>';
                }
            } catch (err) {
                log('иҜ·жұӮеӨұиҙҘ: ' + err.message);
                resultEl.innerHTML = '<p style="color:#f00">зҪ‘з»ңй”ҷиҜҜ: ' + err.message + '</p>';
            } finally {
                showLoading(false);
            }
        }
        
        // ============ жё…з©ә ============
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'd') {
                e.preventDefault();
                log('жё…з©әз»“жһң');
                resultEl.innerHTML = '';
                previewSec.style.display = 'none';
                logEl.textContent = '';
            }
        });
        
        log('йЎөйқўе·ІеҠ иҪҪпјҢзӯүеҫ…ж“ҚдҪң...');
        log('жҸҗзӨә: жҢү Ctrl+D жё…з©әж—Ҙеҝ—');
        console.log('Test with window.uploadFile()');
        window.uploadTest = (file) => processFile(file);
    </script>
</body>
</html>
